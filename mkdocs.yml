# 站点信息
site_name: hjm0703 的博客
site_description: hjm0703 的博客
site_author: hjm0703
site_url: https://hjm-blog.pages.dev

# 版权信息
copyright: © 2024 hjm0703

# 主题配置（与 OI Wiki 一致）
theme:
  name: material
  language: zh
  include_search_page: false
  search_index_only: true
  icon:
    logo: material/school
  palette:
    # 亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.instant
    - content.code.copy
  font:
    text: Fira Sans
    code: Fira Mono

# Markdown 扩展配置
markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: ""
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true

# 额外 JavaScript（MathJax 支持）
extra_javascript:
  - javascripts/math-csr.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# 额外 CSS
extra_css:
  - stylesheets/extra.css

# 导航结构
nav:
  - 首页: index.md
  - STL:
    - bitset: STL/bitset.md
  - 图论:
    - LCA、树上前缀和与差分: graph/LCA、树上前缀和与差分.md
    - DFS 序与树链剖分: graph/DFS 序与树链剖分.md
    - 最段路与 MST: graph/最段路与 MST.md
    - 差分约束: graph/差分约束.md
    - Tarjan: graph/tarjan.md
    - 2-SAT 适定性问题: graph/2-SAT 适定性问题.md
    - 二分图匹配: graph/二分图匹配.md
    - 基环树: graph/基环树.md
  - 题目总结:
    - 做题总结: problem/做题总结.md
